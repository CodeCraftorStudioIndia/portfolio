<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude AI Coding Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #282a36;
            --text-color: #f8f8f2;
            --border-color: #44475a;
            --accent-color: #bd93f9;
            --user-msg: #6272a4;
            --ai-msg: #383a59;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        header {
            background-color: var(--panel-bg);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .settings-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
        }

        input[type="password"], select {
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            outline: none;
            font-size: 14px;
            flex: 1;
            min-width: 150px;
        }

        input[type="password"]:focus, select:focus {
            border-color: var(--accent-color);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
        }

        .ai-message {
            align-self: flex-start;
            background-color: var(--ai-msg);
            border: 1px solid var(--border-color);
            width: 100%;
        }

        /* Styling for markdown code blocks */
        pre {
            background-color: #000;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        
        code {
            font-family: Consolas, Monaco, 'Andale Mono', monospace;
            color: #50fa7b;
        }

        .input-area {
            background-color: var(--panel-bg);
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 12px;
            resize: none;
            height: 50px;
            font-family: inherit;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
        }

        .loader {
            display: none;
            align-self: flex-start;
            font-style: italic;
            color: var(--accent-color);
            padding: 10px;
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .message {
                max-width: 95%;
            }
            .settings-group {
                flex-direction: column;
            }
            input[type="password"], select {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="settings-group">
            <input type="password" id="api-key" placeholder="Enter Anthropic API Key (sk-ant-...)">
            <select id="model-select">
                <option value="claude-3-5-sonnet-latest">Claude 3.5 Sonnet (Best for Coding)</option>
                <option value="claude-3-5-haiku-latest">Claude 3.5 Haiku (Fast & Cheaper)</option>
                <option value="claude-3-opus-latest">Claude 3 Opus (Complex tasks)</option>
                <option value="claude-3-sonnet-20240229">Claude 3 Sonnet (Older)</option>
                <option value="claude-3-haiku-20240307">Claude 3 Haiku (Older)</option>
            </select>
        </div>
    </header>

    <div id="chat-container">
        <div class="message ai-message">
            👋 Hi! I'm your Claude Coding Agent. Please enter your API key at the top, select your model, and tell me what you'd like to build!
        </div>
    </div>
    
    <div class="loader" id="loader">Claude is thinking and writing code...</div>

    <div class="input-area">
        <textarea id="prompt-input" placeholder="Ask me to write some HTML, Python, JS, etc..."></textarea>
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const apiKeyInput = document.getElementById('api-key');
        const modelSelect = document.getElementById('model-select');
        const loader = document.getElementById('loader');

        // Conversation history
        let conversationHistory = [];

        function appendMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(role === 'user' ? 'user-message' : 'ai-message');
            
            // Parse Markdown for AI messages to render code properly
            if (role === 'ai') {
                msgDiv.innerHTML = marked.parse(content);
            } else {
                msgDiv.textContent = content;
            }
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleSend() {
            const apiKey = apiKeyInput.value.trim();
            const prompt = promptInput.value.trim();
            const model = modelSelect.value;

            if (!apiKey) {
                alert("Please enter your Anthropic API Key first.");
                apiKeyInput.focus();
                return;
            }

            if (!prompt) return;

            // Add user message to UI and history
            appendMessage('user', prompt);
            conversationHistory.push({ role: "user", content: prompt });
            promptInput.value = '';
            
            // UI state
            sendBtn.disabled = true;
            loader.style.display = 'block';

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json',
                        // REQUIRED for browser fetch without a backend server
                        'anthropic-dangerous-direct-browser-access': 'true' 
                    },
                    body: JSON.stringify({
                        model: model,
                        max_tokens: 4096,
                        system: "You are an expert software developer and coding assistant. Provide clean, well-documented code.",
                        messages: conversationHistory
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || "API request failed");
                }

                const data = await response.json();
                const aiText = data.content[0].text;

                // Add AI response to UI and history
                appendMessage('ai', aiText);
                conversationHistory.push({ role: "assistant", content: aiText });

            } catch (error) {
                appendMessage('ai', `❌ **Error:** ${error.message}`);
                // Remove the last user message from history so they can retry
                conversationHistory.pop();
            } finally {
                sendBtn.disabled = false;
                loader.style.display = 'none';
                promptInput.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);

        // Allow pressing Enter to send (Shift+Enter for new line)
        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
