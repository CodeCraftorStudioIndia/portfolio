<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude AI Coding Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #282a36;
            --text-color: #f8f8f2;
            --border-color: #44475a;
            --accent-color: #bd93f9;
            --user-msg: #6272a4;
            --ai-msg: #383a59;
            --error-msg: #ff5555;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        header {
            background-color: var(--panel-bg);
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .settings-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            width: 100%;
        }

        input[type="password"], select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-color);
            outline: none;
            font-size: 14px;
            flex: 1;
            min-width: 140px;
        }

        input[type="password"]:focus, select:focus {
            border-color: var(--accent-color);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
        }

        .ai-message {
            align-self: flex-start;
            background-color: var(--ai-msg);
            border: 1px solid var(--border-color);
            width: 100%;
            box-sizing: border-box;
        }

        .error-message {
            align-self: flex-start;
            background-color: rgba(255, 85, 85, 0.1);
            border: 1px solid var(--error-msg);
            color: var(--error-msg);
            width: 100%;
            box-sizing: border-box;
        }

        pre {
            background-color: #000;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
        }
        
        code {
            font-family: Consolas, Monaco, 'Andale Mono', monospace;
            color: #50fa7b;
        }

        .input-area {
            background-color: var(--panel-bg);
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            resize: none;
            height: 44px;
            font-family: inherit;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0 20px;
            height: 46px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
        }

        .loader {
            display: none;
            align-self: flex-start;
            font-style: italic;
            color: var(--accent-color);
            padding: 10px;
        }

        @media (max-width: 600px) {
            .message {
                max-width: 95%;
            }
            .settings-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="settings-row">
            <input type="password" id="api-key" placeholder="Paste Anthropic API Key (sk-ant-...)">
            <select id="model-select">
                <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (Latest & Best for Coding)</option>
                <option value="claude-opus-4-6">Claude Opus 4.6 (Most Powerful)</option>
                <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
                <option value="claude-opus-4-5">Claude Opus 4.5</option>
                <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (Fastest & Cheapest)</option>
                <option value="claude-3-5-sonnet-latest">Claude 3.5 Sonnet (Legacy)</option>
            </select>
        </div>
    </header>

    <div id="chat-container">
        <div class="message ai-message">
            👋 Hi! I'm your Claude Coding Agent. Enter your API key, select your model (like the new 4.6), and tell me what to build!
        </div>
    </div>
    
    <div class="loader" id="loader">Claude is thinking...</div>

    <div class="input-area">
        <textarea id="prompt-input" placeholder="Ask me to write some HTML, Python, JS, etc..."></textarea>
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const apiKeyInput = document.getElementById('api-key');
        const modelSelect = document.getElementById('model-select');
        const loader = document.getElementById('loader');

        let conversationHistory = [];

        function appendMessage(role, content, isError = false) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            
            if (isError) {
                msgDiv.classList.add('error-message');
                msgDiv.innerHTML = `<strong>Error:</strong> ${content}`;
            } else {
                msgDiv.classList.add(role === 'user' ? 'user-message' : 'ai-message');
                // Use Marked.js to render markdown and code blocks for AI
                msgDiv.innerHTML = role === 'ai' ? marked.parse(content) : content;
            }
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function handleSend() {
            const apiKey = apiKeyInput.value.trim();
            const prompt = promptInput.value.trim();
            const model = modelSelect.value;

            if (!apiKey) {
                alert("Please enter your Anthropic API Key first.");
                apiKeyInput.focus();
                return;
            }

            if (!prompt) return;

            appendMessage('user', prompt);
            conversationHistory.push({ role: "user", content: prompt });
            promptInput.value = '';
            
            sendBtn.disabled = true;
            loader.style.display = 'block';

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json',
                        // REQUIRED to bypass Anthropic's block on browser requests (like GitHub pages)
                        'anthropic-dangerous-direct-browser-access': 'true' 
                    },
                    body: JSON.stringify({
                        model: model,
                        max_tokens: 4096,
                        system: "You are an expert software developer. Provide clean, well-documented code.",
                        messages: conversationHistory
                    })
                });

                // Detailed Error Handling
                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error("Invalid API Key. Please check that your key is correct and your Anthropic account has active billing credits.");
                    } else if (response.status === 403) {
                        throw new Error("Access Denied. This could be a CORS issue, or your key does not have permission for this model.");
                    } else if (response.status === 429) {
                        throw new Error("Rate limit exceeded or out of credits. Please check your Anthropic dashboard.");
                    }
                    
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `API request failed with status ${response.status}`);
                }

                const data = await response.json();
                const aiText = data.content[0].text;

                appendMessage('ai', aiText);
                conversationHistory.push({ role: "assistant", content: aiText });

            } catch (error) {
                let errorMsg = error.message;
                // Fetch throws a TypeError on network/CORS failures before HTTP status can be checked
                if (error.name === 'TypeError' && errorMsg.includes('fetch')) {
                    errorMsg = "Network/CORS Error. Ensure 'anthropic-dangerous-direct-browser-access' is allowed by your browser, or check your internet connection.";
                }
                
                appendMessage('ai', errorMsg, true);
                conversationHistory.pop(); // Remove user msg from history so they can try again
            } finally {
                sendBtn.disabled = false;
                loader.style.display = 'none';
                promptInput.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);

        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
